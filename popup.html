<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>YM Track Collector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      user-select: none;
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #f5c518 0%, #f97316 100%);
      padding: 11px 14px 9px;
      display: flex;
      align-items: center;
      gap: 9px;
    }
    .header-icon { font-size: 20px; }
    .header h1   { font-size: 13px; font-weight: 700; color: #111; }
    .header p    { font-size: 10px; color: #333; margin-top: 1px; }

    /* STATS */
    .stats {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px 6px;
    }
    .badge {
      background: #f5c518;
      color: #111;
      font-size: 13px;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 20px;
      min-width: 36px;
      text-align: center;
    }
    .stats-label { font-size: 12px; color: #94a3b8; }

    /* START/STOP BUTTON */
    .ctrl-row { padding: 0 14px 8px; }

    .btn-collect {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: filter 0.15s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-collect:hover  { filter: brightness(1.12); transform: translateY(-1px); }
    .btn-collect:active { transform: translateY(0); }

    .btn-collect.stopped { background: #22c55e; color: #fff; }
    .btn-collect.running { background: #ef4444; color: #fff; }

    /* Пульсирующая точка */
    .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.85;
      flex-shrink: 0;
    }
    .btn-collect.running .dot {
      animation: blink 1s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 0.85; transform: scale(1); }
      50%      { opacity: 1;    transform: scale(1.5); }
    }

    /* DOWNLOAD + RESET */
    .btn-row {
      display: flex;
      gap: 6px;
      padding: 0 14px 8px;
    }
    .btn {
      flex: 1;
      padding: 7px 0;
      border: none;
      border-radius: 7px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn:hover  { filter: brightness(1.15); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-txt   { background: #3b82f6; color: #fff; }
    .btn-csv   { background: #10b981; color: #fff; }
    .btn-reset { background: #1e293b; color: #f87171; border: 1px solid #374151; }

    /* STATUS */
    .status {
      font-size: 10px;
      color: #64748b;
      text-align: center;
      padding: 0 14px 5px;
      min-height: 15px;
    }

    /* TRACK LIST */
    .track-list {
      max-height: 260px;
      overflow-y: auto;
      padding: 0 14px 12px;
    }
    .track-list::-webkit-scrollbar       { width: 3px; }
    .track-list::-webkit-scrollbar-track { background: transparent; }
    .track-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    .track-num {
      display: inline-block;
      font-size: 10px;
      color: #475569;
      width: 22px;
      flex-shrink: 0;
    }
    .track-item {
      display: flex;
      align-items: baseline;
      gap: 4px;
      padding: 5px 0;
      border-bottom: 1px solid #1e293b;
    }
    .track-item:last-child { border-bottom: none; }
    .track-text { flex: 1; font-size: 11.5px; line-height: 1.4; }
    .track-artist { color: #94a3b8; }
    .track-title  { color: #f1f5f9; font-weight: 500; }

    .empty {
      padding: 20px 14px;
      text-align: center;
      color: #475569;
      font-size: 12px;
      line-height: 1.7;
    }

    .divider { height: 1px; background: #1e293b; margin: 0 14px 8px; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">🎵</div>
    <div>
      <h1>YM Track Collector</h1>
      <p>Яндекс.Музыка — сборщик плейлиста</p>
    </div>
  </div>

  <div class="stats">
    <span class="badge" id="count">0</span>
    <span class="stats-label">треков собрано</span>
  </div>

  <div class="ctrl-row">
    <button class="btn-collect stopped" id="btnCollect">
      <span class="dot"></span>
      <span id="collectLabel">Начать сбор</span>
    </button>
  </div>

  <div class="btn-row">
    <button class="btn btn-txt"   id="downloadTxt">⬇ TXT</button>
    <button class="btn btn-csv"   id="downloadCsv">⬇ CSV</button>
    <button class="btn btn-reset" id="resetTracks">↺ Сброс</button>
  </div>

  <div class="status" id="status"></div>
  <div class="divider"></div>

  <div id="trackContainer">
    <div class="empty">Нет треков.<br>Откройте плейлист, нажмите «Начать сбор»<br>и медленно прокручивайте вниз.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
